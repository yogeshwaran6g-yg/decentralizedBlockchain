<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Premium Web3 User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b0b0f",
                        "accent-gold": "#D4AF37",
                        "accent-gold-light": "#F9E076",
                        "background-light": "#f7f7f7",
                        "background-dark": "#0b0b0f",
                        "card-glass": "rgba(23, 23, 27, 0.7)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(23, 23, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gold-glow-border {
            position: relative;
        }

        .gold-glow-border::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(to bottom right, rgba(212, 175, 55, 0.5), rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .action-gradient-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #8A6D3B 100%);
        }

        .active-nav-bg {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0) 100%);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0b0f;
        }

        ::-webkit-scrollbar-thumb {
            background: #2f2f32;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37;
        }
    </style>
</head>

<body class="bg-background-dark font-display text-white selection:bg-accent-gold/30">
    <div class="flex min-h-screen">
        <aside class="w-64 flex-shrink-0 border-r border-white/5 bg-primary fixed h-full z-50">
            <div class="flex h-full flex-col p-4">
                <div class="flex items-center gap-3 px-2 py-6 mb-4">
                    <div
                        class="w-10 h-10 rounded-full flex items-center justify-center action-gradient-gold shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                        <span class="material-symbols-outlined text-primary font-bold">diamond</span>
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-white text-base font-bold tracking-tight">LUXE ECOSYSTEM</h1>
                        <p class="text-accent-gold text-[10px] font-bold uppercase tracking-[0.2em]">Premium Access</p>
                    </div>
                </div>
                <nav class="flex-1 space-y-1">
                    <div
                        class="flex items-center gap-3 px-3 py-2.5 rounded-lg active-nav-bg border-l-2 border-accent-gold group cursor-pointer">
                        <span class="material-symbols-outlined text-accent-gold">grid_view</span>
                        <p class="text-white text-sm font-medium">Dashboard</p>
                    </div>
                </nav>
            </div>
        </aside>
        <main class="flex-1 ml-64 min-h-screen flex flex-col">
            <header
                class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-8 sticky top-0 z-40">
                <div class="flex items-center gap-6">
                    <span
                        class="text-xs font-mono text-accent-gold-light bg-accent-gold/10 px-2 py-0.5 rounded border border-accent-gold/20">0x71C...4e2</span>
                </div>
                <button
                    class="h-10 px-6 rounded-lg action-gradient-gold text-primary font-bold text-sm tracking-wide">Connect
                    Wallet</button>
            </header>
            <div class="p-8 space-y-8 max-w-[1600px] mx-auto w-full">
                <h2 class="text-2xl font-bold">Project Ready for React Development</h2>
                <p class="text-gray-400">Environment issue detected with npm. See README.md for instructions.</p>
            </div>
        </main>
    </div>
</body>

</html>
